<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>관리자 로그인 · 매일묘일</title>

    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
          rel="stylesheet"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#ffca45",
                        "pastel-bg": "#fffefc",
                    },
                    fontFamily: {
                        sans: ["Pretendard", "-apple-system", "BlinkMacSystemFont", "system-ui", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        body {
            @apply bg-pastel-bg font-sans;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-5">

<div class="w-full max-w-sm flex flex-col gap-5">

    <!-- 로고 -->
    <div class="flex flex-col items-center gap-1.5 mb-2">
        <span class="material-symbols-outlined text-3xl text-gray-700">pets</span>
        <span class="font-bold text-gray-800 text-lg tracking-tight">매일묘일</span>
        <span class="text-xs font-semibold text-gray-500 bg-gray-100 px-2.5 py-0.5 rounded-full">관리자 로그인</span>
    </div>

    <!-- 카드 -->
    <div class="bg-white rounded-3xl px-6 py-6 border border-gray-100 flex flex-col gap-4">

        <!-- 1단계: 코드 받기 -->
        <div>
            <p class="text-xs font-semibold text-gray-500 mb-2">1단계</p>
            <button id="send-btn" onclick="sendCode()"
                    class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl
                           text-sm font-semibold bg-gray-100 text-gray-700
                           hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed
                           transition-all active:scale-[0.98]">
                <svg id="send-spinner" class="hidden animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                </svg>
                <span class="material-symbols-outlined text-base" id="send-icon">mail</span>
                <span id="send-label">관리자 이메일로 코드 받기</span>
            </button>
        </div>

        <div class="border-t border-gray-100"></div>

        <!-- 2단계: 코드 입력 -->
        <div>
            <p class="text-xs font-semibold text-gray-500 mb-2">2단계</p>
            <div class="flex gap-2">
                <input id="code-input"
                       type="text"
                       inputmode="numeric"
                       maxlength="6"
                       placeholder="6자리 코드"
                       class="flex-1 px-3.5 py-2.5 rounded-xl border border-gray-200
                              text-sm font-mono text-center tracking-widest text-gray-800
                              placeholder:text-gray-300 placeholder:tracking-normal placeholder:font-sans
                              focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20
                              transition-all"
                       onkeydown="if(event.key==='Enter') verify()"/>
                <button onclick="verify()" id="verify-btn"
                        class="px-4 py-2.5 rounded-xl text-sm font-semibold
                               bg-primary text-gray-800
                               hover:brightness-105 disabled:opacity-50 disabled:cursor-not-allowed
                               transition-all active:scale-[0.98]">
                    <svg id="verify-spinner" class="hidden animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                    </svg>
                    <span id="verify-label">확인</span>
                </button>
            </div>
        </div>

        <!-- 결과 메시지 -->
        <div id="result" class="hidden text-xs px-3.5 py-2.5 rounded-xl flex items-center gap-2"></div>

    </div>

    <p class="text-center text-xs text-gray-400">© 2026 Mail Meowil. All rights reserved.</p>
</div>

<script>
    async function sendCode() {
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        document.getElementById('send-spinner').classList.remove('hidden');
        document.getElementById('send-icon').classList.add('hidden');
        document.getElementById('send-label').textContent = '발송 중...';
        hideResult();

        try {
            const res = await fetch('/admin/login/send-code', {method: 'POST'});
            if (res.ok) {
                document.getElementById('send-label').textContent = '코드 발송됨 (재발송)';
                document.getElementById('send-icon').classList.remove('hidden');
                showResult('success', '이메일을 확인해 주세요. 코드는 1시간 동안 유효합니다.');
                document.getElementById('code-input').focus();
            } else {
                document.getElementById('send-label').textContent = '관리자 이메일로 코드 받기';
                document.getElementById('send-icon').classList.remove('hidden');
                showResult('error', '코드 발송에 실패했어요. 다시 시도해 주세요.');
            }
        } catch (e) {
            document.getElementById('send-label').textContent = '관리자 이메일로 코드 받기';
            document.getElementById('send-icon').classList.remove('hidden');
            showResult('error', '코드 발송에 실패했어요. 다시 시도해 주세요.');
        } finally {
            document.getElementById('send-spinner').classList.add('hidden');
            btn.disabled = false;
        }
    }

    async function verify() {
        const code = document.getElementById('code-input').value.trim();
        if (code.length !== 6) {
            showResult('error', '6자리 코드를 입력해 주세요.');
            return;
        }

        const btn = document.getElementById('verify-btn');
        btn.disabled = true;
        document.getElementById('verify-spinner').classList.remove('hidden');
        document.getElementById('verify-label').classList.add('hidden');
        hideResult();

        try {
            const res = await fetch(`/admin/login/verify?code=${encodeURIComponent(code)}`, {method: 'POST'});
            if (res.ok) {
                showResult('success', '인증 성공! 이동 중...');
                window.location.href = '/admin';
            } else if (res.status === 401) {
                showResult('error', '코드가 올바르지 않거나 만료됐어요.');
            } else {
                showResult('error', '오류가 발생했어요. 다시 시도해 주세요.');
            }
        } catch (e) {
            showResult('error', '오류가 발생했어요. 다시 시도해 주세요.');
        } finally {
            document.getElementById('verify-spinner').classList.add('hidden');
            document.getElementById('verify-label').classList.remove('hidden');
            btn.disabled = false;
        }
    }

    function showResult(type, message) {
        const el = document.getElementById('result');
        if (type === 'success') {
            el.className = 'text-xs px-3.5 py-2.5 rounded-xl flex items-center gap-2 bg-green-50 text-green-700';
            el.innerHTML = `<span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">check_circle</span>${message}`;
        } else {
            el.className = 'text-xs px-3.5 py-2.5 rounded-xl flex items-center gap-2 bg-red-50 text-red-600';
            el.innerHTML = `<span class="material-symbols-outlined text-sm">error</span>${message}`;
        }
        el.classList.remove('hidden');
    }

    function hideResult() {
        document.getElementById('result').classList.add('hidden');
    }
</script>
</body>
</html>
