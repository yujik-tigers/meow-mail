<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <title>매일묘일</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f5f0;font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',Arial,sans-serif;">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
       style="background-color:#f6f5f0;">
    <tr>
        <td align="center" style="padding:48px 0 40px;">

            <!-- 가로 스크롤 컨테이너 -->
            <div style="width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0"
                       style="width:auto;margin:0 auto;">
                    <tr>
                        <!-- 즉석 사진 카드 1 (영어) -->
                        <td style="padding:0 12px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0"
                                   style="width:400px;background-color:#ffffff;
                                          box-shadow:0 4px 6px rgba(0,0,0,0.08),0 12px 32px rgba(0,0,0,0.10),2px 2px 0 #e8e4de;
                                          border-radius:2px;">
                                <tr>
                                    <td style="padding:16px 16px 0;"></td>
                                </tr>
                                <tr>
                                    <td style="padding:0 16px;">
                                        <img src="cid:catImageEng"
                                             alt="오늘의 고양이 사진 (영어)"
                                             width="368"
                                             style="display:block;width:100%;height:auto;border:none;"/>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:18px 16px 22px;">
                                        <p style="margin:0;font-size:15px;color:#b0a89a;
                                                  font-family:'Courier New',Courier,monospace;
                                                  letter-spacing:0.08em;"
                                           th:text="${date}"></p>
                                    </td>
                                </tr>
                            </table>
                        </td>

                        <!-- 즉석 사진 카드 2 (한국어) -->
                        <td style="padding:0 12px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0"
                                   style="width:400px;background-color:#ffffff;
                                          box-shadow:0 4px 6px rgba(0,0,0,0.08),0 12px 32px rgba(0,0,0,0.10),2px 2px 0 #e8e4de;
                                          border-radius:2px;">
                                <tr>
                                    <td style="padding:16px 16px 0;"></td>
                                </tr>
                                <tr>
                                    <td style="padding:0 16px;">
                                        <img src="cid:catImageKor"
                                             alt="오늘의 고양이 사진 (한국어)"
                                             width="368"
                                             style="display:block;width:100%;height:auto;border:none;"/>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:18px 16px 22px;">
                                        <p style="margin:0;font-size:15px;color:#b0a89a;
                                                  font-family:'Courier New',Courier,monospace;
                                                  letter-spacing:0.08em;"
                                           th:text="${date}"></p>
                                    </td>
                                </tr>
                            </table>
                        </td>

                        <!-- 즉석 사진 카드 3 (텍스트 없음) -->
                        <td style="padding:0 12px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0"
                                   style="width:400px;background-color:#ffffff;
                                          box-shadow:0 4px 6px rgba(0,0,0,0.08),0 12px 32px rgba(0,0,0,0.10),2px 2px 0 #e8e4de;
                                          border-radius:2px;">
                                <tr>
                                    <td style="padding:16px 16px 0;"></td>
                                </tr>
                                <tr>
                                    <td style="padding:0 16px;">
                                        <img src="cid:catImageNone"
                                             alt="오늘의 고양이 사진 (텍스트 없음)"
                                             width="368"
                                             style="display:block;width:100%;height:auto;border:none;"/>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding:18px 16px 22px;">
                                        <p style="margin:0;font-size:15px;color:#b0a89a;
                                                  font-family:'Courier New',Courier,monospace;
                                                  letter-spacing:0.08em;"
                                           th:text="${date}"></p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </div>
            <!-- /가로 스크롤 컨테이너 -->

            <!-- 구독 관리 링크 -->
            <table role="presentation" cellspacing="0" cellpadding="0" border="0"
                   style="width:360px;margin-top:20px;">
                <tr>
                    <td align="center">
                        <span style="font-size:12px;color:#c8c0b8;padding:0 8px;">·</span>
                        <a th:href="${unsubscribeUrl}"
                           target="_blank"
                           style="font-size:14px;color:#a09890;text-decoration:none;letter-spacing:0.03em;">
                            구독 취소
                        </a>
                        <span style="font-size:12px;color:#c8c0b8;padding:0 8px;">·</span>
                        <a href="mailto:dev.mail.meow@gmail.com"
                           style="font-size:14px;color:#a09890;text-decoration:none;letter-spacing:0.03em;">
                            묘한 아이디어 제보
                        </a>
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
