<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>구독 신청 · 매일묘일</title>

    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
          rel="stylesheet"/>

    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#ffca45",
                        secondary: "#a1c606",
                        "pastel-bg": "#fffefc",
                        "background-dark": "#081022",
                    },
                    fontFamily: {
                        display: ["Pretendard", "-apple-system", "BlinkMacSystemFont", "system-ui", "Roboto", "sans-serif"],
                        sans: ["Pretendard", "-apple-system", "BlinkMacSystemFont", "system-ui", "Roboto", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="/css/subscribe.css"/>
</head>

<body class="min-h-screen flex items-center justify-center p-6 transition-colors duration-300">

<main class="max-w-lg w-full">

    <!-- ── STEP 1: 구독 폼 ── -->
    <div id="step-form" class="step active">
        <div class="form-card bg-white dark:bg-gray-900 rounded-[2.5rem] overflow-hidden">
            <div class="p-10">

                <!-- 헤더 -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full mb-5 font-semibold text-sm"
                         style="background:rgba(161,198,6,0.15);color:#a1c606;">
                        매일묘일
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 dark:text-white leading-tight mb-2">
                        고양이 편지 배송 서비스
                    </h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm">
                        매일 아침 8시에 고양이 편지를 보내드려요
                    </p>
                </div>

                <!-- 이메일 -->
                <div class="mb-2">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5"
                           for="email">
                        이메일
                    </label>
                    <!-- 이메일 입력 + 인증하기 버튼 (가로 배치) -->
                    <div class="flex gap-2">
                        <div class="relative flex-1 min-w-0">
                            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 text-base pointer-events-none">
                                mail
                            </span>
                            <input id="email" name="email" type="email" autocomplete="email"
                                   placeholder="example@email.com"
                                   class="w-full pl-10 pr-3 py-3 rounded-2xl border border-gray-100 text-sm dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-secondary/40 focus:border-gray-100 transition"/>
                        </div>
                        <button id="send-verify-btn" type="button" disabled
                                class="shrink-0 px-4 py-3 rounded-2xl bg-secondary text-white font-semibold text-sm flex items-center gap-1.5 hover:brightness-105 active:scale-[0.98] transition disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap">
                            <svg id="verify-btn-spinner" class="hidden animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                            </svg>
                            <span id="verify-btn-label">인증하기</span>
                        </button>
                    </div>
                </div>

                <!-- 이메일 하단 상태 영역 -->
                <div id="email-status" class="mb-5">
                    <!-- 에러 메시지 -->
                    <p id="email-error" class="hidden mt-1.5 text-xs text-red-500 flex items-center gap-1">
                        <!--                        <span class="material-symbols-outlined text-sm">error</span>-->
                        <span id="email-error-msg"></span>
                    </p>
                    <!-- 인증 대기 + 타이머 -->
                    <div id="verify-pending" class="hidden mt-1.5">
                        <div class="flex items-center justify-between">
                            <p class="text-xs text-amber-600 dark:text-amber-400 flex items-center gap-1">
                                인증 메일을 보냈어요 메일함을 확인해 주세요
                            </p>
                            <div class="flex items-center gap-2">
                                <span id="timer"
                                      class="text-xs font-mono font-bold text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/30 px-2 py-0.5 rounded-full">
                                    30:00
                                </span>
                                <button id="cancel-verify-btn" type="button"
                                        class="text-xs font-normal text-gray-600 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 px-2.5 py-0.5 rounded-full transition active:scale-95 flex items-center gap-1">
                                    취소
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- 타이머 만료 -->
                    <p id="verify-expired" class="hidden mt-1.5 text-xs text-red-500 flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">timer_off</span>
                        인증 유효 시간이 만료되었어요 다시 요청해 주세요
                    </p>
                    <!-- 인증 성공 -->
                    <p id="verify-success" class="hidden mt-1.5 text-xs text-secondary flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">verified</span>
                        이메일 인증을 완료했어요
                    </p>
                    <!-- 인증 실패 -->
                    <p id="verify-fail" class="hidden mt-1.5 text-xs text-red-500 flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">cancel</span>
                        <span id="verify-fail-msg"></span>
                    </p>
                    <!-- 항상 표시되는 힌트 -->
                    <p id="email-hint" class="mt-1.5 text-xs text-gray-400 dark:text-gray-500">
                        이메일 인증을 완료하면 구독이 시작돼요
                    </p>
                </div>

            </div>
        </div>

        <!-- 하단 칩 -->
        <div class="mt-6 flex flex-wrap justify-center gap-3">
            <div class="backdrop-blur-md px-4 py-2 rounded-full text-xs flex items-center gap-2 font-semibold bg-white/60 dark:bg-gray-800/60 text-gray-500 dark:text-gray-400">
                <span class="material-symbols-outlined text-sm">verified</span>
                냥님 검수 완료
            </div>
            <div class="backdrop-blur-md px-4 py-2 rounded-full text-xs flex items-center gap-2 font-semibold bg-white/60 dark:bg-gray-800/60 text-gray-500 dark:text-gray-400">
                <span class="material-symbols-outlined text-sm">mail</span>
                <a href="mailto:dev.mail.meow@gmail.com">
                    묘한 아이디어 제보하기
                </a>
            </div>
        </div>
    </div>

    <!-- ── STEP 2: 구독 완료 ── -->
    <div id="step-done" class="step">
        <div id="done-card" class="form-card bg-white dark:bg-gray-900 rounded-[2.5rem] overflow-hidden">
            <div class="p-10 text-center">
                <div id="done-icon" class="text-4xl mb-6 floating">🐾</div>
                <h2 id="done-title" class="text-xl font-semibold text-gray-800 dark:text-white mb-3"></h2>
                <p id="done-message" class="text-l text-gray-500 dark:text-gray-400 mb-8 leading-relaxed whitespace-pre-line"></p>
                <div class="pt-6 border-t border-gray-100 dark:border-gray-800 space-y-1">
                    <p class="text-xs text-gray-400 dark:text-gray-500">이 창은 닫아도 돼요</p>
                </div>
            </div>
        </div>
    </div>

</main>

<script src="/js/subscribe.js"></script>
</body>
</html>
