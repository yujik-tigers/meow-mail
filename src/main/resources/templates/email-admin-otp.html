<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body style="margin:0;padding:0;background:#f9f9f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f9f9f7;padding:40px 0;">
    <tr>
        <td align="center">
            <table width="480" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

                <!-- 헤더 -->
                <tr>
                    <td style="background:#ffca45;padding:28px 40px;text-align:center;">
                        <p style="margin:0;font-size:18px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;">
                            🐾 매일묘일 관리자 인증
                        </p>
                    </td>
                </tr>

                <!-- 본문 -->
                <tr>
                    <td style="padding:40px 40px 32px;">
                        <p style="margin:0 0 8px;font-size:14px;color:#555;line-height:1.6;">
                            아래 인증 코드를 입력해 관리자 페이지에 접속하세요.
                        </p>
                        <p style="margin:0 0 28px;font-size:13px;color:#999;">
                            코드는 1시간 동안 유효하며, 사용 후 만료됩니다.
                        </p>

                        <!-- OTP 코드 박스 -->
                        <div style="background:#f5f5f2;border-radius:14px;padding:28px;text-align:center;margin-bottom:28px;">
                            <p style="margin:0 0 6px;font-size:11px;font-weight:600;color:#999;letter-spacing:1.5px;text-transform:uppercase;">
                                인증 코드
                            </p>
                            <p th:text="${code}"
                               style="margin:0;font-size:40px;font-weight:700;color:#1a1a1a;letter-spacing:10px;font-family:'Courier New',monospace;">
                                000000
                            </p>
                        </div>

                        <p style="margin:0;font-size:12px;color:#bbb;line-height:1.6;">
                            본인이 요청하지 않은 경우 이 메일을 무시하세요.
                        </p>
                    </td>
                </tr>

                <!-- 푸터 -->
                <tr>
                    <td style="background:#f9f9f7;padding:20px 40px;text-align:center;border-top:1px solid #f0f0ee;">
                        <p style="margin:0;font-size:11px;color:#bbb;">
                            © 2026 Mail Meowil. All rights reserved.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
